logging:
  out_path: 'out/path_integration/single_run/1D/good_model'
  # history:
  #   record: true
  #   buffer_size: 64
model:
  input_layer:
    seed: 0
    w_bi: identity
    w_ir: identity
    pertubation: override
    encoding: base2
    features: 1
    redundancy: 3
    resolution: 8
    chunks: 1
    ticks: '1'
  output_layer:
    seed: 0
    n_outputs: 1
  reservoir_layer:
    seed: 0
    init: random
    k_avg: 3
    k_min: 0
    k_max: 25
    mode: homogeneous
    n_nodes: 1024
    reset: true
    self_loops: 0
  training:
    seed: 0
    accuracy_threshold: 0.05
    batch_size: 128
    criterion: MSE
    epochs: 40
    evaluation: test
dataset:
  seed: 0
  encoding: cartesian
  dimensions: 1
  steps: 5
  strategy:
    name: PhysicsWalkStrategy
    params:
      max_force: 0.5
      mass: 1.0
      friction_coeff: 0.1
      friction_order: 2
      max_speed: 10
  boundary:
    name: IntervalBoundary
  split:
    train: 0.5
    dev: 0.3
    test: 0.2
  samples: 20000
