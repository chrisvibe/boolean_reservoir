logging:
  out_path: '/tmp/boolean_reservoir/out/test/path_integration/2D/grid_search/reset_false'
  save_keys: null 
  grid_search:
    n_samples: 1
model:
  input_layer:
    w_bi: identity
    w_ir: identity 
    pertubation: override
    encoding: base2
    features: 2
    # redundancy: 3
    redundancy: 10
    resolution: 3
    chunk_size: 3
    ticks: '1'
  output_layer:
    n_outputs: 2
  reservoir_layer:
    init: random
    k_avg: 3.0
    k_min: 0
    k_max: 10
    mode: heterogeneous
    n_nodes: 1024
    reset: false
    self_loops: 0.3
  training:
    reset: false # critical if samples are daisty chained
    accuracy_threshold: 0.25
    batch_size: 1024
    criterion: MSE
    epochs: 40
    evaluation: dev
dataset:
  train:
    reset: false # critical if samples are daisty chained
    encoding: ['cartesian', 'polar']
    dimensions: 2
    steps: 5
    strategy:
      name: PhysicsWalkStrategy
      params:
        max_force: 0.1
        mass: 1.0
        friction_coeff: 0.1
        friction_order: 2
        max_speed: 10 
    boundary:
      name: PolygonBoundary
      params:
        n_sides: 12
        radius: 1.0
        rotation: pi/4
    split:
      train: 0.5
      dev: 0.3
      test: 0.2
    samples: 20000
    seed: 0