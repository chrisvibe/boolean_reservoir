logging:
  out_path: '/tmp/boolean_reservoir/out/test/path_integration/2D/grid_search/multiverse_kqgr'
  grid_search:
    seed: 0
    n_samples: 1
    run: ['train', 'kqgr']
model:
  input_layer:
    pertubation: 'override'
    encoding: 'binary_embedding'
    features: 2
    resolution: [7, 9]
    redundancy: 3
    interleaving: 0
  reservoir_layer:
    n_nodes: 64
    k_avg: [2, 3]
    k_max: 6
    self_loops: 0
    init: 'zeros'
    mode: 'homogeneous'
  output_layer:
    n_outputs: 2
  training:
    batch_size: 64
    epochs: 2
    accuracy_threshold: 0.05
    evaluation: 'dev'
dataset:
  dimensions: 2
  steps: 5
  samples: [2000, 4000]
  strategy:
    name: LevyFlightStrategy
  boundary:
    name: PolygonBoundary
    params:
      n_sides: 4
      radius: 0.5
      rotation: 0
  split:
    train: 0.4
    dev: 0.3
    test: 0.3
  samples: 2000
  seed: 0
multiverse_overrides:
  kqgr_PI:
    dataset:
      tau: 2
      evaluation: first
  kqgr_T:
    dataset:
      name: temporal
      tau: 2
      evaluation: first
      task: density
      sampling_mode: exhaustive
      shuffle: true
      seed: 0
    model:
      input_layer:
        features: 1
        redundancy: 1
        resolution: 7
        chunk_size: 1
        chunks: null
        bits: null
      output_layer:
        activation: sigmoid
        n_outputs: 1
